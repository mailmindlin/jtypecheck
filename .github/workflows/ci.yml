name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi (pinned toolchain)
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.66.0
          cache: true

      # Builds the Rust workspace AND the annotations JAR.
      - name: Build
        run: pixi run build

      # Regenerates the Java .class fixtures, then runs all Cargo tests.
      - name: Test
        run: pixi run test

      - name: Clippy
        run: pixi run lint

      - name: Format check
        run: pixi run cargo fmt --all -- --check
